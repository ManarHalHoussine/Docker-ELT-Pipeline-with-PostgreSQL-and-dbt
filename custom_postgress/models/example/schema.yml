version: 2

models:
  - name: films
    description: "Films model loaded from source table"
    columns:
      - name: film_id
        description: "Primary key of the film"
        tests:
          - not_null
          - unique

      - name: title
        description: "Title of the film"
        tests:
          - not_null

  - name: actors
    description: "Actors model loaded from source table"
    columns:
      - name: actor_id
        description: "Primary key of the actor"
        tests:
          - not_null
          - unique

      - name: actor_name
        description: "Actor full name"
        tests:
          - not_null

  - name: film_actors
    description: "Bridge table between films and actors"
    columns:
      - name: film_id
        tests:
          - not_null

      - name: actor_id
        tests:
          - not_null

  - name: film_ratings
    description: "Films enriched with user rating category and actors"
    columns:
      - name: film_id
        tests:
          - not_null
          - unique

      - name: title
        tests:
          - not_null

      - name: user_rating
        tests:
          - not_null

      - name: rating_category
        tests:
          - not_null